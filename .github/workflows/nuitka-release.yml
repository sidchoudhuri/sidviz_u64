name: Build and Release sidviz_u64

on:
  push:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Build with Nuitka
        uses: Nuitka/Nuitka-Action@main
        with:
          nuitka-version: main
          script-name: sidviz_c64.py  # Updated to your filename
          mode: app
          onefile: true
          output-filename: sidviz_u64-${{ runner.os }}

      - name: Prepare macOS App Bundle (Zip)
        if: runner.os == 'macOS'
        run: zip -r build/sidviz_u64-macOS.app.zip build/*.app

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          draft: false
          prerelease: false
          files: |
            build/*.exe
            build/*.bin
            build/*.app.zip

